<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GameStore</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0d0d0d;
      }

      .form-card {
        background-color: #1a1a1f;
        color: #e6e6e6;
        border: 1px solid #14ffec;
      }

      .form-control,
      .form-control:focus {
        background-color: #0d0d0d;
        color: #e6e6e6;
        border-color: #14ffec;
      }

      .form-control::placeholder {
        color: #777;
      }

      .navbar {
        background-color: #1a1a1f !important;
        border-bottom: 2px solid #14ffec;
      }

      .navbar-brand {
        font-size: 1.8rem;
        font-weight: bold;
        color: #9ef01a !important;
      }

      .btn-outline-light {
        color: #14ffec;
        border-color: #14ffec;
      }

      .btn-outline-light:hover {
        background-color: #14ffec;
        color: #0d0d0d;
      }

      .btn-success {
        background-color: #9ef01a;
        border-color: #9ef01a;
        color: #0d0d0d;
      }

      .btn-success:hover {
        background-color: #14ffec;
        border-color: #14ffec;
        color: #0d0d0d;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark px-3" style="background-color: #0f3460">
      <div class="container">
        <span class="navbar-brand">GamePulse Backoffice</span>
        <div>
          <a href="./index.html" class="btn btn-outline-light"
            >Torna al Negozio</a
          >
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row">
        <div class="col-12 col-lg-7 mb-4">
          <div class="card form-card shadow p-3">
            <h4 class="mb-3">Giochi Salvati</h4>
            <div id="games-list" class="row g-3"></div>
          </div>
        </div>

        <div class="col-12 col-lg-5 mb-4">
          <div class="card form-card shadow">
            <div
              class="card-header"
              style="background-color: #000000; color: white"
            >
              <h4 class="mb-0" id="form-title">Aggiungi Nuovo Gioco</h4>
            </div>

            <div class="card-body">
              <form id="game-form">
                <input type="hidden" id="game-id" />

                <div class="mb-3">
                  <label for="name" class="form-label">Nome del gioco *</label>
                  <input
                    type="text"
                    class="form-control"
                    id="name"
                    required
                    placeholder="es. Elden Ring"
                  />
                </div>

                <div class="mb-3">
                  <label for="description" class="form-label"
                    >Descrizione *</label
                  >
                  <textarea
                    class="form-control"
                    id="description"
                    rows="3"
                    required
                    placeholder="Descrivi il gioco..."
                  ></textarea>
                </div>

                <div class="mb-3">
                  <label for="brand" class="form-label"
                    >Sviluppatore / Publisher *</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="brand"
                    required
                    placeholder="es. FromSoftware"
                  />
                </div>

                <div class="mb-3">
                  <label for="imageUrl" class="form-label"
                    >URL Immagine *</label
                  >
                  <input
                    type="url"
                    class="form-control"
                    id="imageUrl"
                    required
                    placeholder="https://..."
                  />
                </div>

                <div class="mb-3">
                  <label for="price" class="form-label">Prezzo (€) *</label>
                  <input
                    type="number"
                    step="0.01"
                    min="0"
                    class="form-control"
                    id="price"
                    required
                    placeholder="69.99"
                  />
                </div>

                <div class="d-flex gap-2 flex-wrap">
                  <button type="submit" class="btn btn-success">
                    Salva Gioco
                  </button>
                  <button
                    type="button"
                    class="btn btn-secondary"
                    onclick="resetForm()"
                  >
                    Reset
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const API_URL = "https://striveschool-api.herokuapp.com/api/product/";
      const TOKEN =
        "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJfaWQiOiI2OWUxZTU5YTczOWY4NzAwMTU3YWIwOGEiLCJpYXQiOjE3NzY0MTIwNTgsImV4cCI6MTc3NzYyMTY1OH0.rgoeDRLd8J9zMxcRNmWfnbGkIh5_m8WaPhWgdcRSfJo";

      class Game {
        constructor(_name, _description, _brand, _imageUrl, _price) {
          this.name = _name;
          this.description = _description;
          this.brand = _brand;
          this.imageUrl = _imageUrl;
          this.price = _price;
        }
      }

      const form = document.getElementById("game-form");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const id = document.getElementById("game-id").value;

        const gioco = new Game(
          document.getElementById("name").value,
          document.getElementById("description").value,
          document.getElementById("brand").value,
          document.getElementById("imageUrl").value,
          document.getElementById("price").value,
        );

        const method = id ? "PUT" : "POST";
        const url = id ? API_URL + id : API_URL;

        fetch(url, {
          method,
          body: JSON.stringify(gioco),
          headers: {
            "Content-Type": "application/json",
            Authorization: TOKEN,
          },
        })
          .then((res) => {
            if (res.ok) {
              resetForm();
              loadGames();
            } else {
              throw new Error("Errore nel salvataggio");
            }
          })
          .catch((err) => console.log("ERRORE SALVATAGGIO", err));
      });

      function loadGames() {
        fetch(API_URL, {
          headers: { Authorization: TOKEN },
        })
          .then((res) => res.json())
          .then((games) => {
            const list = document.getElementById("games-list");
            list.innerHTML = "";

            games.forEach((game) => {
              const col = document.createElement("div");
              col.classList.add("col-12", "col-md-6");

              col.innerHTML = `
  <div class="card game-card h-100"
       style="
         background-image: url('${game.imageUrl}');
         background-size: cover;
         background-position: center;
         background-repeat: no-repeat;
         border: 2px solid #14ffec;
         overflow: hidden;
       ">
       
    <div class="card-body d-flex flex-column"
         style="
           background: rgba(0,0,0,0.65);
           backdrop-filter: blur(3px);
           color: white;
         ">
         
      <h5 class="card-title fw-bold">${game.name}</h5>
      <p class="price fs-5">€${game.price}</p>

      <div class="d-flex gap-2 mt-auto">
        <button class="btn btn-warning" onclick="editGame('${game._id}')">
          Modifica
        </button>

        <button class="btn btn-danger" onclick="deleteGame('${game._id}')">
          Elimina
        </button>
      </div>

    </div>
  </div>
`;

              list.appendChild(col);
            });
          })
          .catch((err) => console.log("ERRORE CARICAMENTO LISTA", err));
      }

      function deleteGame(id) {
        const conferma = confirm(
          "Vuoi davvero eliminare questo gioco? L'azione è irreversibile.",
        );

        if (!conferma) return;

        fetch(API_URL + id, {
          method: "DELETE",
          headers: { Authorization: TOKEN },
        })
          .then((res) => {
            if (res.ok) {
              loadGames();
            } else {
              throw new Error("Errore eliminazione");
            }
          })
          .catch((err) => console.log("ERRORE ELIMINAZIONE", err));
      }

      function editGame(id) {
        fetch(API_URL + id, {
          headers: { Authorization: TOKEN },
        })
          .then((res) => res.json())
          .then((game) => {
            document.getElementById("game-id").value = game._id;
            document.getElementById("name").value = game.name;
            document.getElementById("description").value = game.description;
            document.getElementById("brand").value = game.brand;
            document.getElementById("imageUrl").value = game.imageUrl;
            document.getElementById("price").value = game.price;

            document.getElementById("form-title").innerText = "Modifica Gioco";
          })
          .catch((err) => console.log("ERRORE CARICAMENTO GIOCO", err));
      }

      function resetForm() {
        if (confirm("Sei sicuro di voler resettare il form?")) {
          form.reset();
          document.getElementById("form-title").innerText =
            "Aggiungi Nuovo Gioco";
          document.getElementById("game-id").value = "";
        }
      }

      loadGames();
    </script>
  </body>
</html>
