<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GameStore</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0d0d0d;
      }

      .game-card {
        background: #1a1a1f;
        color: #e6e6e6;
        border: 1px solid #14ffec;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        height: 100%;
      }

      .game-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 0 20px rgba(20, 255, 236, 0.4);
      }

      .game-card .card-title {
        color: #9ef01a;
        font-weight: bold;
      }

      .game-card .price {
        color: #14ffec;
        font-size: 1.5rem;
        font-weight: bold;
      }

      .game-card .brand {
        color: #9a9a9a;
        font-size: 0.9rem;
      }

      .game-card img {
        height: 220px;
        object-fit: cover;
      }

      .navbar {
        background-color: #1a1a1f !important;
        border-bottom: 2px solid #14ffec;
      }

      .navbar-brand {
        font-size: 1.8rem;
        font-weight: bold;
        color: #9ef01a !important;
      }

      .btn-warning {
        background-color: #9ef01a;
        border-color: #9ef01a;
        color: #0d0d0d;
      }

      .btn-warning:hover {
        background-color: #14ffec;
        border-color: #14ffec;
        color: #0d0d0d;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark px-3">
      <div class="container">
        <span class="navbar-brand">GamePulse</span>

        <div class="d-flex align-items-center gap-3">
          <div class="dropdown">
            <button
              class="btn btn-warning dropdown-toggle"
              type="button"
              data-bs-toggle="dropdown"
            >
              <img
                src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAABOklEQVR4AbSTzXHCMBCF7TSRK+kix1BBKkiGAqAGoAcunPgpgwtcGYqAI12YbzVIg70rYSPD7ENGu/s+L5Y/ijd/HKCqqhHa3zXrk+kADcMpoHNj7+WfDlCW5RoNRTgN0QCIn6jLqqZ3AAyt+GGzq9T0FmCAcU7I9GESC3DJcW/2KgDP4UCRPIeXhUdyAvz7CzUBp2eF/T5HeMjhwKIoFMDt9vhlAQI9gxMOigXI8NWtFiD3PSg4RckJQlLfT6udWr81waaVTbxo/piyAGsKakX8bhNy53P+HukP9QpAwQXNUNf4oiG8wZ6gAD7R15oE8EZu0RX9WkD2k3npiQJoHlPwhz7REtXiWd4XRwEUnJCPnb94WJ/lXWkUwAM7UvGNJlz/s9aCvWTeF0cBUiAmaCHXlsgdUTQvPTcAAAD///ZPXfUAAAAGSURBVAMAuZSfMYsF7L0AAAAASUVORK5CYII="
                alt="icon"
              />
              <span id="cart-count" class="badge bg-dark">0</span>
            </button>
            <ul
              id="cart-dropdown"
              class="dropdown-menu dropdown-menu-dark p-2"
              style="min-width: 260px"
            >
              <li class="text-center text-secondary">Il carrello è vuoto</li>
            </ul>
          </div>

          <a href="./backoffice.html" class="btn btn-warning">Backoffice</a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <h2 class="mb-4 text-white">Catalogo Videogiochi</h2>
      <div id="products-container" class="row g-4"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const API_URL = "https://striveschool-api.herokuapp.com/api/product/";
      const TOKEN =
        "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJfaWQiOiI2OWUxZTU5YTczOWY4NzAwMTU3YWIwOGEiLCJpYXQiOjE3NzY0MTIwNTgsImV4cCI6MTc3NzYyMTY1OH0.rgoeDRLd8J9zMxcRNmWfnbGkIh5_m8WaPhWgdcRSfJo";
      const getGames = function () {
        fetch(API_URL, {
          headers: {
            Authorization: TOKEN,
          },
        })
          .then((response) => {
            if (response.ok) {
              return response.json();
            } else {
              throw new Error("Response NON ok");
            }
          })
          .then((games) => {
            const container = document.getElementById("products-container");
            container.innerHTML = "";

            games.forEach((game) => {
              const newCol = document.createElement("div");
              newCol.classList.add("col-12", "col-md-6", "col-lg-4");

              newCol.innerHTML = `
                <div class="card game-card h-100">
                  <img src="${game.imageUrl}" class="card-img-top" alt="${game.name}">
                  <div class="card-body d-flex flex-column">
                    <h5 class="card-title">${game.name}</h5>
                    <p class="brand">${game.brand}</p>
                    <p class="card-text flex-grow-1">${game.description}</p>
                    <div class="mt-auto">
  <p class="price mb-2">€${game.price}</p>
  <a href="./details.html?id=${game._id}" class="btn btn-warning w-100">VEDI DETTAGLI</a>
  <a class="btn btn-success w-100 mt-2 buy-btn" data-id="${game._id}" data-name="${game.name}" data-price="${game.price}">
    COMPRA
  </a>
</div>

                  </div>
                </div>
              `;

              container.appendChild(newCol);
            });
          })
          .catch((error) => {
            console.log("ERRORE NEL RECUPERO GIOCHI", error);
          });
      };

      getGames();
      let cart = [];

      function updateCartUI() {
        const dropdown = document.getElementById("cart-dropdown");
        const count = document.getElementById("cart-count");

        dropdown.innerHTML = "";
        count.textContent = cart.length;

        if (cart.length === 0) {
          dropdown.innerHTML = `<li class="text-center text-secondary">Il carrello è vuoto</li>`;
          return;
        }

        cart.forEach((item) => {
          const li = document.createElement("li");
          li.classList.add("dropdown-item");
          li.innerHTML = `${item.name} - €${item.price}`;
          dropdown.appendChild(li);
        });

        dropdown.innerHTML += `<li><hr class="dropdown-divider"></li>`;
        dropdown.innerHTML += `<li class="dropdown-item text-warning fw-bold">Totale: €${cart.reduce((t, i) => t + i.price, 0)}</li>`;
      }

      document.addEventListener("click", function (e) {
        if (e.target.classList.contains("buy-btn")) {
          const name = e.target.dataset.name;
          const price = parseFloat(e.target.dataset.price);

          cart.push({ name, price });
          updateCartUI();
        }
      });
    </script>
  </body>
</html>
